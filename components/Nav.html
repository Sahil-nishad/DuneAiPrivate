<!-- ═══════════════════════════════════════
     COMPONENT: Navigation
     File: components/Nav.html
═══════════════════════════════════════ -->
<nav id="main-nav">
  <a href="#" class="nav-logo">
    <div class="logo-dot"></div>
    <div>DUNE<span>AI</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#products">Products</a></li>
    <li><a href="#process">Process</a></li>
    <li><a href="#about">About</a></li>
  </ul>
  <button class="nav-cta" onclick="document.getElementById('cta').scrollIntoView({behavior:'smooth'})">
    Dune With Us
  </button>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobile-menu">
  <a href="#services"  onclick="closeMobileMenu()">Services</a>
  <a href="#products" onclick="closeMobileMenu()">Products</a>
  <a href="#process"   onclick="closeMobileMenu()">Process</a>
  <a href="#about"     onclick="closeMobileMenu()">About</a>
  <a href="#cta"       onclick="closeMobileMenu()" class="mobile-cta">Dune With Us</a>
</div>

<style>
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5vw;
  height: 72px;
  background: rgba(5,5,8,0.7);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
nav.scrolled { background: rgba(5,5,8,0.95); }

.nav-logo {
  font-family: var(--font-head);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--white);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 2;
}
.nav-logo span { color: var(--gold); }

.logo-dot {
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--gold);
  animation: pulse-dot 2s ease-in-out infinite;
  flex-shrink: 0;
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}
.nav-links a {
  text-decoration: none;
  color: var(--grey);
  font-size: 0.82rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.3s;
  font-family: var(--font-body);
  font-weight: 600;
}
.nav-links a:hover { color: var(--gold); }

.nav-cta {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 0.5rem 1.4rem;
  font-family: var(--font-head);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  cursor: none;
  border-radius: 2px;
  transition: background 0.3s, box-shadow 0.3s;
  text-transform: uppercase;
}
.nav-cta:hover {
  background: rgba(201,168,106,0.1);
  box-shadow: var(--glow-gold);
}

/* Hamburger */
.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: none;
  padding: 4px;
  z-index: 2;
}
.nav-hamburger span {
  display: block;
  width: 24px; height: 1px;
  background: var(--gold);
  transition: transform 0.3s, opacity 0.3s;
}
.nav-hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; }
.nav-hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

/* Mobile menu */
.mobile-menu {
  position: fixed;
  top: 72px; left: 0; right: 0;
  background: rgba(5,5,8,0.98);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 2rem 5vw;
  gap: 1.5rem;
  z-index: 999;
  transform: translateY(-110%);
  transition: transform 0.4s ease;
}
.mobile-menu.open { transform: translateY(0); }
.mobile-menu a {
  text-decoration: none;
  color: var(--grey);
  font-family: var(--font-body);
  font-size: 1rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.3s;
}
.mobile-menu a:hover { color: var(--white); }
.mobile-cta {
  color: var(--gold) !important;
  font-family: var(--font-head) !important;
  font-size: 0.85rem !important;
}

@media (max-width: 768px) {
  .nav-links, .nav-cta { display: none; }
  .nav-hamburger { display: flex; }
}
</style>

<script>
// Scroll bg
window.addEventListener('scroll', () => {
  const nav = document.getElementById('main-nav');
  nav.classList.toggle('scrolled', window.scrollY > 50);
});

// Mobile menu
const hamburger = document.getElementById('nav-hamburger');
const mobileMenu = document.getElementById('mobile-menu');
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('open');
  mobileMenu.classList.toggle('open');
});

function closeMobileMenu() {
  hamburger.classList.remove('open');
  mobileMenu.classList.remove('open');
}
</script>
